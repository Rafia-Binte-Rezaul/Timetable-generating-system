  <!-- SINGLE SCRIPT ONLY: CLEAN + WORKING -->
<script>
const params = new URLSearchParams(window.location.search);
const teacherId = params.get("id");
const isEditMode = teacherId !== null;

// Load teacher when editing
async function loadTeacher() {
    if (!isEditMode) return;

    try {
        const res = await fetch("api/teachers.php?id=" + teacherId);
        const t = await res.json();

        document.getElementById("name").value = t.name;
        document.getElementById("maxHours").value = t.max_hours;
        document.getElementById("breakTime").value = t.break_time;

        let offDaysArray = [];
        try { offDaysArray = JSON.parse(t.off_days); } catch {}

        offDaysArray.forEach(day => {
            const box = document.querySelector(`input[value="${day}"]`);
            if (box) box.checked = true;
        });

    } catch (err) {
        console.error(err);
        alert("Failed to load teacher details.");
    }
}

loadTeacher();

// Save teacher (POST or PUT)
document.getElementById("teacherForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const maxHours = document.getElementById("maxHours").value;
    const breakTime = document.getElementById("breakTime").value;

    const offDays = Array.from(document.querySelectorAll(".checkbox-group input:checked"))
        .map(cb => cb.value);

    const payload = {
        name,
        maxHours,
        breakTime,
        offDays
    };

    let url = "api/teachers.php";
    let method = "POST";

    if (isEditMode) {
        url += "?id=" + teacherId;
        method = "PUT";
    }

    const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (result.success) {
        window.location.href = "teachers.html";
    } else {
        alert("Error saving teacher");
    }
});

function cancel() {
    window.location.href = "teachers.html";
}
</script>
